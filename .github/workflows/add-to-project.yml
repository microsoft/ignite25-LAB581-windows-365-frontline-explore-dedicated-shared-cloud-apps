name: "Add new issues to Ignite GH Project"

on:
  issues:
    types: [opened]

jobs:
  add-to-project:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      id-token: write
    steps:
      - name: Add issue to project
        env:
          GITHUB_TOKEN: ${{ secrets.ADD_TO_PROJECT }}
          PROJECT_URL: ${{ secrets.GH_PROJECT_URL }}
        run: |
          gh api graphql -f query='
            mutation($project:ID!, $issue:ID!) {
              addProjectV2ItemById(input: {projectId: $project, contentId: $issue}) {
                item {
                  id
                }
              }
            }' -f project="$PROJECT_URL" -f issue="${{ github.event.issue.node_id }}"

  label_issues:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read
    steps:
      - name: Label issue
        env:
          GITHUB_TOKEN: ${{ github.token }}
          ISSUE_LABEL: ${{ secrets.ISSUE_LABEL }}
        run: |
          if [ -n "$ISSUE_LABEL" ]; then
            gh api \
              --method POST \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "/repos/${{ github.repository }}/issues/${{ github.event.issue.number }}/labels" \
              -f labels[]="$ISSUE_LABEL"
          fi